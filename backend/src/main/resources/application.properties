spring.application.name=personal-crm-backend

server.port=8080
server.servlet.context-path=/api

spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.root=INFO
logging.level.com.personalcrm=DEBUG

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/personal_crm?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:personal_crm}
spring.datasource.password=${DB_PASSWORD:personal_crm}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.fail-on-missing-locations=false

app.jwt.secret=${JWT_SECRET:personal-crm-local-jwt-secret-key-change-me}
app.jwt.issuer=${JWT_ISSUER:personal-crm}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
